name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - run: uv pip install --system ruff mypy
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy custom_components/ vaillant/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - run: uv pip install --system -r requirements_test.txt
      - run: pytest --cov=custom_components --cov=vaillant --cov-report=xml
      - uses: codecov/codecov-action@v5
