name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
      - name: Install deps
        run: pip install ruff
      - name: Ruff
        run: ruff check custom_components/
      - name: Compile check
        run: python3 -m compileall -f custom_components/vaillant_ebus/
