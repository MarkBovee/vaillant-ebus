name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build release zip
        run: |
          git archive --format=zip -o /tmp/vaillant_ebus.zip \
            "${{ github.ref_name }}" \
            hacs.json custom_components/vaillant_ebus/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/vaillant_ebus.zip
          generate_release_notes: true
